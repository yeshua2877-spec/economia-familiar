databases:
  - name: economia-familiar-db
    plan: free
    databaseName: economia_familiar
    user: economia_familiar

services:
  - type: web
    name: economia-familiar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: economia-familiar-db
          property: connectionString
